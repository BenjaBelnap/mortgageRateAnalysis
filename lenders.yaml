# Lender registry: which adapters run, where they fetch from, and how each
# lender's raw product labels map to structured LoanAttributes.
#
# Adding a lender: drop an adapters/<slug>.py module (or reuse
# HtmlTableLenderAdapter for a simple label+rate%+APR% table) and a block
# here. Nothing else needs to change.
#
# NOTE on product_map keys: for HtmlTableLenderAdapter, each key is matched
# as a substring against the visible text of every <tr> on the rates page.
# These labels were sourced from a live look at each site's rates page
# (2026-07) but rate pages change their wording over time — if an adapter
# starts returning fewer observations than expected, re-check the label
# text against the live page and update the keys below (no code change
# needed).

lenders:
  # Disabled: sits behind an Incapsula JS bot-challenge, confirmed live
  # 2026-07 — a plain HTTP client gets a challenge page regardless of
  # headers, not rate data. Not attempting to defeat that (see README
  # "Known limitation" section). Re-enable if an official/licensed data
  # source or a different access path turns up.
  macu:
    name: "Mountain America Credit Union"
    type: local
    region: "UT"
    homepage: "https://www.macu.com"
    rates_url: "https://www.macu.com/rates/home"
    enabled: false
    product_map:
      "30-year fixed mortgage":
        loan_term_years: 30
        is_fixed: true
      "15-year fixed mortgage":
        loan_term_years: 15
        is_fixed: true
      "FHA 30-year fixed":
        loan_term_years: 30
        is_fixed: true
        is_fha: true
      "VA 30-year fixed":
        loan_term_years: 30
        is_fixed: true
        is_va: true
      "5/1 adjustable rate mortgage":
        loan_term_years: 30
        is_fixed: false
        arm_fixed_period_years: 5

  rocket:
    name: "Rocket Mortgage"
    type: national
    region: null
    homepage: "https://www.rocketmortgage.com"
    rates_url: "https://www.rocketmortgage.com/mortgage-rates"
    enabled: true
    # Labels below are verbatim from the live page's <sc-rate-card> elements
    # (checked 2026-07) — this page is NOT a plain HTML table, see
    # adapters/rocket.py for the bespoke parser.
    product_map:
      "30-year fixed":
        loan_term_years: 30
        is_fixed: true
      "20-year fixed":
        loan_term_years: 20
        is_fixed: true
      "15-year fixed":
        loan_term_years: 15
        is_fixed: true
      "30-year FHA":
        loan_term_years: 30
        is_fixed: true
        is_fha: true
      "30-year VA":
        loan_term_years: 30
        is_fixed: true
        is_va: true
      "30-year jumbo fixed":
        loan_term_years: 30
        is_fixed: true
        is_jumbo: true

  afcu:
    name: "America First Credit Union"
    type: local
    region: "UT"
    homepage: "https://www.americafirst.com"
    rates_url: "https://www.americafirst.com/rates/loan-rates.html"
    enabled: true
    # AFCU's table has an extra Discount Points column between rate and APR
    # (verified live 2026-07): "10 Year Fixed | 5.625% | 0.5% | 5.952%".
    percent_field_order: [interest_rate, points, apr]
    product_map:
      "10 Year Fixed":
        loan_term_years: 10
        is_fixed: true
      "15 Year Fixed":
        loan_term_years: 15
        is_fixed: true
      "20 Year Fixed":
        loan_term_years: 20
        is_fixed: true
      "30 Year Fixed":
        loan_term_years: 30
        is_fixed: true
      "FHA 30 Year":
        loan_term_years: 30
        is_fixed: true
        is_fha: true
      "VA 30 Year":
        loan_term_years: 30
        is_fixed: true
        is_va: true

  zions:
    name: "Zions Bank"
    type: local
    region: "UT"
    homepage: "https://www.zionsbank.com"
    rates_url: "https://www.zionsbank.com/personal/home-loans/mortgage-rates/"
    enabled: true
    # Zions fakes a table with divs, not real <tr> — verified live 2026-07.
    row_selector: ".cmp-rates-tables__tr"
    product_map:
      "15-Year Conventional Fixed":
        loan_term_years: 15
        is_fixed: true
      "30-Year Conventional Fixed":
        loan_term_years: 30
        is_fixed: true
      "7/1 Adjustable-Rate Mortgage":
        loan_term_years: 30
        is_fixed: false
        arm_fixed_period_years: 7
      "30-Year Fixed FHA Loan":
        loan_term_years: 30
        is_fixed: true
        is_fha: true
      "30-Year VA Fixed":
        loan_term_years: 30
        is_fixed: true
        is_va: true
      "7/1 Jumbo ARM":
        loan_term_years: 30
        is_fixed: false
        arm_fixed_period_years: 7
        is_jumbo: true

  # Not yet implemented — its own mortgage-specific rates page didn't have
  # findable rate content on a plain GET (checked 2026-07); likely lives in a
  # third-party widget (uccumo.mymortgage-online.com). Flip to true once
  # adapters/uccu.py exists and the real source is confirmed.
  uccu:
    name: "Utah Community Credit Union"
    type: local
    region: "UT"
    homepage: "https://www.uccu.com"
    rates_url: "https://www.uccu.com/rates-and-yields/"
    enabled: false
    product_map: {}

  goldenwest:
    name: "Goldenwest Credit Union"
    type: local
    region: "UT"
    homepage: "https://www.gwcu.org"
    rates_url: "https://www.gwcu.org/borrow/home-loans/home-loan-rates/"
    enabled: true
    # Real <table class="rates-table">, one per product category, verified
    # live 2026-07. The FHA and VA category tables exist on the page but are
    # currently empty (no rows) -- only conventional fixed products publish
    # numbers right now, so that's all that's mapped below.
    row_selector: "table.rates-table tr"
    product_map:
      "30 Year Fixed Loan":
        loan_term_years: 30
        is_fixed: true
      "20 Year Fixed Loan":
        loan_term_years: 20
        is_fixed: true
      "15 Year Fixed Loan":
        loan_term_years: 15
        is_fixed: true

  # Disabled: consistently returns 403 via httpx (confirmed live 2026-07,
  # retried multiple times) despite an identical standard-browser UA header
  # succeeding via curl -- that mismatch points to Cloudflare fingerprinting
  # the TLS/HTTP client itself (JA3-style), not filtering on the UA string.
  # Not attempting to spoof that fingerprint -- same "don't defeat a bot
  # wall" line as MACU/Incapsula. The adapter/fixture/tests below are kept
  # working in case a different access path (or client stack) turns up.
  utahfirst:
    name: "Utah First Credit Union"
    type: local
    region: "UT"
    homepage: "https://utahfirst.com"
    rates_url: "https://utahfirst.com/rates/"
    enabled: false
    # The page has several unrelated rate tables (auto, RV, signature loans)
    # sharing the same "table table-striped" class, so row_selector scopes to
    # the Home Mortgages tab specifically. Each row's label is split across
    # Type/Product/Term cells rather than one cell -- product_map keys below
    # are substrings of the concatenated "Type Product Term" text, verified
    # live 2026-07 (e.g. row text "Fixed Conventional 30 Years ...").
    row_selector: "#homeratetab table tr"
    product_map:
      "Conventional 30 Years":
        loan_term_years: 30
        is_fixed: true
      "Conventional 15 Years":
        loan_term_years: 15
        is_fixed: true
      "Conventional 10 Years":
        loan_term_years: 10
        is_fixed: true
      "5/1 Adjustable 30 Years":
        loan_term_years: 30
        is_fixed: false
        arm_fixed_period_years: 5
      "FHA 30 Years":
        loan_term_years: 30
        is_fixed: true
        is_fha: true
      "FHA 15 Years":
        loan_term_years: 15
        is_fixed: true
        is_fha: true
      "VA 30 Years":
        loan_term_years: 30
        is_fixed: true
        is_va: true

  granite:
    name: "Granite Credit Union"
    type: local
    region: "UT"
    homepage: "https://www.granite.org"
    rates_url: "https://www.granite.org/real-estate-loans"
    enabled: true
    # Rate/Fee/APR cells are populated client-side via
    # document.write(getRateTweak('KEY')), not plain text -- doesn't fit
    # HtmlTableLenderAdapter. See adapters/granite.py: the same KEY -> value
    # pairs are embedded statically as JSON elsewhere in the page (a
    # Squarespace tweak blob), so the bespoke adapter reads those numbers
    # directly out of the raw HTML response without executing any JS.
    # Verified live 2026-07. Only the "Traditional Mortgage" table's 3
    # conventional/ARM products are mapped -- short-term (5/7/10/12yr),
    # HELOC, construction, and reverse-mortgage rows are niche products not
    # comparable to what other lenders in this dataset publish.
    percent_field_order: [interest_rate, points, apr]
    product_map:
      "30-Year Conventional":
        loan_term_years: 30
        is_fixed: true
      "30-Year – 7/6 mo ARM":
        loan_term_years: 30
        is_fixed: false
        arm_fixed_period_years: 7
      "15-Year Conventional":
        loan_term_years: 15
        is_fixed: true

